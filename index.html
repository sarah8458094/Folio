<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Folio</title>

    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />

    <meta name="theme-color" content="#1E293B" />
</head>

<body>
<main class="app">
    <section id="home" class="page active">
        <h1>Overview</h1>
    </section>

    <section id="books" class="page">
        <h1>My Books</h1>
    </section>
    
    <section id="add" class="page">
        <h1>Buch hinzufügen</h1>
    </section>

    <section id="social" class="page">
        <h1>Social</h1>
    </section>

    <section id="profile" class="page">
        <h1>Profil</h1>
    </section>

    <nav>
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('books')">Bücher</button>
        <button class="add-btn" onclick="showPage('add')">+</button>
        <button onclick="showPage('social')">Social</button>
        <button onclick="showPage('profile')">Profil</button>
    </nav>
</main>

<script type="module" src="js/db.js"></script>
<script src="js/app.js"></script>
</body>
</html>
