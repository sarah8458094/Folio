<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Readly</title>

    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />

    <meta name="theme-color" content="#1E293B" />
</head>
<body>
<main class="app">
    <header>
        <h1>Readly</h1>
        <p>Track. Read. Grow.</p>
    </header>

    <section class="card hero">

        <p>0 Bücher gelesen</p>

    <section class="card">

        <p>Noch kein Buch ausgewählt.</p>
        <button>Timer starten</button>
    </section>

    <nav>
        <button>Home</button>
        <button>Bücher</button>
        <button>Timer</button>
        <button>Stats</button>
    </nav>
</main>

<script src="js/app.js"></script>

</html>
